<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- BẠN CÓ THỂ THAY ĐỔI TIÊU ĐỀ (TÊN APP) Ở ĐÂY -->
    <title>Ví Mật Mã - Két Sắt Bảo Mật Thần Tốc</title>
    
    <!-- PWA Meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- BẠN CÓ THỂ THAY ĐỔI TÊN APP KHI TẢI TRÊN IPHONE Ở ĐÂY -->
    <meta name="apple-mobile-web-app-title" content="Ví Mật Mã" />
    <meta name="theme-color" content="#020617" />
    
    <!-- PWA Icons (BẠN CÓ THỂ THAY LINK ẢNH ICON CỦA BẠN Ở ĐÂY) -->
    <!-- Khi bạn tải ảnh lên thư mục public (ví dụ: public/logo.png), bạn có thể đổi link thành href="./logo.png" -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/192/security-shield.png" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/nolan/64/security-shield.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
  </head>
  <body class="bg-[#020617]">
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        let refreshing = false;

        // Automatically reload the page when a new service worker takes control (claiming clients)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          // Only reload if we already had a controlling service worker (avoids reload on first-ever install)
          if (navigator.serviceWorker.controller) {
            refreshing = true;
            console.log('[PWA] Hệ thống đã phát hiện bản cập nhật mới! Tự động làm mới ứng dụng...');
            window.location.reload();
          }
        });

        window.addEventListener('load', () => {
          // Robust path resolver for GitHub Pages / subfolders vs standard custom domains & Vercel
          let swPath = './sw.js';
          if (window.location.hostname.includes('github.io')) {
            const pathParts = window.location.pathname.split('/');
            const repo = pathParts[1];
            if (repo && repo !== 'index.html') {
              swPath = `/${repo}/sw.js`;
            }
          }
          
          navigator.serviceWorker.register(swPath)
            .then((reg) => {
              console.log('PWA Service Worker registered successfully:', reg.scope);

              // Periodic background update check every 5 minutes if online
              setInterval(() => {
                if (navigator.onLine) {
                  reg.update().catch(err => console.debug('[PWA] Periodic update check failed:', err));
                }
              }, 5 * 60 * 1000); // 5 minutes
            })
            .catch((err) => {
              console.log('PWA Service Worker registration failed:', err);
            });
        });

        // Check for updates instantly whenever the app is brought back to focus / unlocked on mobile
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.ready.then((reg) => {
              if (navigator.onLine) {
                console.log('[PWA] App focused. Checking for updates...');
                reg.update().catch(err => console.debug('[PWA] Focus-triggered update check failed:', err));
              }
            });
          }
        });
      }
    </script>
  </body>
</html>
